version: '3'

services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:vinay2004@localhost:5432/notes-app
    ports:
      - "8001:8001"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://backend:8001
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=vinay2004
      - POSTGRES_DB=notes-app
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: